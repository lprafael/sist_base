version: '3.8'

services:
  # Base de Datos con PostGIS Integrado
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: SIGEL-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=SIGEL
    ports:
      - "5434:5432"
    volumes:
      - sigel_db_data:/var/lib/postgresql/data
    networks:
      - SIGEL-network

  backend:
    image: sigel-backend:latest
    container_name: SIGEL-backend
    ports:
      - "8002:8001"
    depends_on:
      - db
    environment:
      - PORT=8001
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://postgres:admin@db:5432/SIGEL
    env_file:
      - ./backend/.env
    volumes:
      # Solo exponemos los logs hacia afuera, no machacamos el código interno
      - ./backend/logs:/app/logs
    restart: unless-stopped
    networks:
      - SIGEL-network
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: sigel-frontend:latest
    container_name: SIGEL-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - SIGEL-network
    # Sin volumen montado para que Nginx sirva solo lo de adentro del contenedor
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  SIGEL-network:
    driver: bridge

volumes:
  sigel_db_data:
